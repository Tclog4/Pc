<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Build Editor</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<header>

<div class="logo">
PC BRAND Builder
</div>

<nav>

<a href="dashboard.html">Dashboard</a>
<a href="index.html">Website</a>

</nav>

</header>





<section class="hero">

<h1>
Build Editor
</h1>

<p>
Manage customer PC information.
</p>

</section>







<section>


<div class="pc-card">


<h2>
Build Information
</h2>


<label>
Build ID
</label>

<br>

<input value="BUILD-48291">


<br><br>


<label>
Customer Name
</label>

<br>

<input placeholder="Customer name">


<br><br>


<label>
Customer Email
</label>

<br>

<input placeholder="Email">


</div>


</section>








<section>


<div class="pc-card">


<h2>
PC Details
</h2>


<label>
PC Model
</label>

<br>

<input value="Shadow Mk1">


<br><br>


<label>
CPU
</label>

<br>

<input value="Ryzen 5 5600">


<br><br>


<label>
GPU
</label>

<br>

<input value="RTX 3060 Ti">


<br><br>


<label>
RAM
</label>

<br>

<input value="16GB DDR4">


<br><br>


<label>
Storage
</label>

<br>

<input value="1TB NVMe SSD">


</div>


</section>









<section>


<div class="pc-card">


<h2>
Build Status
</h2>


<select>

<option>
Parts Ordered
</option>

<option>
Building
</option>

<option>
Cable Management
</option>

<option>
Testing
</option>

<option>
Ready For Delivery
</option>

<option>
Delivered
</option>


</select>


</div>


</section>








<section>


<div class="pc-card">


<h2>
Testing Checklist
</h2>


<p>
☑ CPU Stress Test
</p>

<p>
☑ GPU Stress Test
</p>

<p>
☐ Final Temperature Check
</p>

<p>
☐ Packaging Check
</p>


</div>


</section>








<section>


<div class="pc-card">


<h2>
Notes</h2>


<textarea placeholder="Add build notes..."></textarea>


<br>


<button onclick="saveBuild()">
Save Changes
</button>


<h3 id="saved"></h3>


</div>


</section>







<script>


function saveBuild(){


document.getElementById("saved").innerHTML =
"✅ Build Updated";


}


</script>







<footer>

<p>
© 2026 PC BRAND
</p>

</footer>


</body>

</html>
